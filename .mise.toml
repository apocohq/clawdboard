[tools]
swiftlint = "0.63"
ruff = "latest"

[tasks.build]
description = "Build the project"
run = "swift build"

[tasks.run]
description = "Build and run Clawdboard"
run = "swift run Clawdboard"

[tasks.test]
description = "Run tests (requires Xcode for Swift Testing framework)"
run = """
#!/bin/bash
set -euo pipefail
output=$(swift test 2>&1) && echo "$output" || {
    if echo "$output" | grep -q "no such module"; then
        echo "⚠ swift test requires Xcode (for Swift Testing framework)."
        echo "  Install Xcode from the App Store, then run:"
        echo "  sudo xcode-select -s /Applications/Xcode.app"
        echo "  Skipping tests."
        exit 0
    else
        echo "$output"
        exit 1
    fi
}
"""

[tasks.format]
description = "Format Swift and Python files"
run = """
#!/bin/bash
set -euo pipefail
swift format format --in-place --recursive Sources/ Tests/
ruff format hooks/ scripts/
"""

[tasks.lint]
description = "Lint Swift and Python files"
run = """
#!/bin/bash
set -euo pipefail
swift format lint --strict --recursive Sources/ Tests/
set +e
swiftlint lint --strict --quiet 2>&1
rc=$?
set -e
if [ $rc -ne 0 ]; then
    if [ $rc -gt 128 ]; then
        echo "⚠ swiftlint crashed (requires Xcode SourceKit). Skipping."
    else
        exit $rc
    fi
fi
ruff check hooks/ scripts/
ruff format --check hooks/ scripts/
"""

[tasks.clean]
description = "Clean build artifacts"
run = "swift package clean"

[tasks.setup]
description = "Install tools and configure git hooks"
run = """
mise install
mise generate git-pre-commit --write
# Fix mise's default pre-commit hook: use newline-separated file list
# so grep can match by extension (mise uses -z | xargs -0 which is space-separated)
sed -i '' 's/diff-index --cached --name-only -z HEAD | xargs -0/diff-index --cached --name-only HEAD/' .git/hooks/pre-commit
echo "Done! Tools installed and pre-commit hook configured."
"""

[tasks.pre-commit]
description = "Pre-commit checks on staged Swift and Python files"
run = """
#!/bin/bash
set -euo pipefail

SWIFT_FILES=$(echo "$STAGED" | grep '\\.swift$' || true)
PY_FILES=$(echo "$STAGED" | grep '\\.py$' || true)

if [ -z "$SWIFT_FILES" ] && [ -z "$PY_FILES" ]; then
    echo "No staged Swift or Python files, skipping checks."
    exit 0
fi

if [ -n "$SWIFT_FILES" ]; then
    echo "swift-format..."
    echo "$SWIFT_FILES" | xargs swift format lint --strict

    echo "swiftlint..."
    echo "$SWIFT_FILES" | xargs swiftlint lint --strict --quiet
fi

if [ -n "$PY_FILES" ]; then
    echo "ruff check..."
    echo "$PY_FILES" | xargs ruff check

    echo "ruff format..."
    echo "$PY_FILES" | xargs ruff format --check
fi

echo "All checks passed."
"""
