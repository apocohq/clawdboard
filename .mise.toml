[tools]
swiftlint = "0.63"

[tasks.build]
description = "Build the project"
run = "swift build"

[tasks.run]
description = "Build and run Clawdboard"
run = "swift run Clawdboard"

[tasks.test]
description = "Run tests"
run = "swift test"

[tasks.format]
description = "Format Swift files with swift-format"
run = "swift-format format --in-place --recursive Sources/ Tests/"

[tasks.lint]
description = "Lint Swift files with swift-format and swiftlint"
run = """
swift-format lint --strict --recursive Sources/ Tests/
swiftlint lint --strict --quiet
"""

[tasks.clean]
description = "Clean build artifacts"
run = "swift package clean"

[tasks.setup]
description = "Install tools and configure git hooks"
run = """
mise install
mise generate git-pre-commit --write
echo "Done! Tools installed and pre-commit hook configured."
"""

[tasks.pre-commit]
description = "Pre-commit checks on staged Swift files"
run = """
#!/bin/bash
set -euo pipefail

STAGED=$(echo "$STAGED" | grep '\\.swift$' || true)
if [ -z "$STAGED" ]; then
    echo "No staged Swift files, skipping checks."
    exit 0
fi

echo "swift-format..."
echo "$STAGED" | xargs swift-format lint --strict

echo "swiftlint..."
echo "$STAGED" | xargs swiftlint lint --strict --quiet

echo "All checks passed."
"""
