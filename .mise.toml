[tools]
swiftlint = "0.63"

[tasks.build]
description = "Build the project"
run = "swift build"

[tasks.run]
description = "Build and run Clawdboard"
run = "swift run Clawdboard"

[tasks.test]
description = "Run tests (requires Xcode for Swift Testing framework)"
run = """
#!/bin/bash
set -euo pipefail
output=$(swift test 2>&1) && echo "$output" || {
    if echo "$output" | grep -q "no such module"; then
        echo "⚠ swift test requires Xcode (for Swift Testing framework)."
        echo "  Install Xcode from the App Store, then run:"
        echo "  sudo xcode-select -s /Applications/Xcode.app"
        echo "  Skipping tests."
        exit 0
    else
        echo "$output"
        exit 1
    fi
}
"""

[tasks.format]
description = "Format Swift files with swift-format"
run = "swift format format --in-place --recursive Sources/ Tests/"

[tasks.lint]
description = "Lint Swift files with swift-format and swiftlint"
run = """
#!/bin/bash
set -euo pipefail
swift format lint --strict --recursive Sources/ Tests/
set +e
swiftlint lint --strict --quiet 2>&1
rc=$?
set -e
if [ $rc -ne 0 ]; then
    if [ $rc -gt 128 ]; then
        echo "⚠ swiftlint crashed (requires Xcode SourceKit). Skipping."
    else
        exit $rc
    fi
fi
"""

[tasks.clean]
description = "Clean build artifacts"
run = "swift package clean"

[tasks.setup]
description = "Install tools and configure git hooks"
run = """
mise install
mise generate git-pre-commit --write
echo "Done! Tools installed and pre-commit hook configured."
"""

[tasks.pre-commit]
description = "Pre-commit checks on staged Swift files"
run = """
#!/bin/bash
set -euo pipefail

STAGED=$(echo "$STAGED" | grep '\\.swift$' || true)
if [ -z "$STAGED" ]; then
    echo "No staged Swift files, skipping checks."
    exit 0
fi

echo "swift-format..."
echo "$STAGED" | xargs swift format lint --strict

echo "swiftlint..."
echo "$STAGED" | xargs swiftlint lint --strict --quiet

echo "All checks passed."
"""
