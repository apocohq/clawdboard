name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: uv sync
      - run: mise run lint 2>&1 | tee /tmp/output.txt; exit ${PIPESTATUS[0]}
      - if: failure()
        run: |
          # Emit last 50 lines as a warning annotation so it's visible via API
          tail -50 /tmp/output.txt | while IFS= read -r line; do echo "::warning::$line"; done

  test-python:
    name: Python Tests
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: uv sync
      - run: mise run test-py

  build:
    name: Build
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: mise run build 2>&1 | tee /tmp/output.txt; exit ${PIPESTATUS[0]}
      - if: failure()
        run: |
          tail -50 /tmp/output.txt | while IFS= read -r line; do echo "::warning::$line"; done

  test:
    name: Swift Tests
    runs-on: macos-26
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: mise run test 2>&1 | tee /tmp/output.txt; exit ${PIPESTATUS[0]}
      - if: failure()
        run: |
          tail -80 /tmp/output.txt | while IFS= read -r line; do echo "::warning::$line"; done
